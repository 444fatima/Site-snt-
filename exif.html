<h1>Métadonnées EXIF</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Exif_data_example.png">

<p>
Les données EXIF sont des informations cachées dans une image.
</p>

<p>
Elles contiennent : date, appareil photo, paramètres de prise de vue et GPS.
</p>

<p>
Elles permettent d’analyser une photo et vérifier son origine.
</p>
